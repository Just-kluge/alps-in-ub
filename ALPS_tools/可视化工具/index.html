<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NS-3 UB Topology 3D Viewer - Stage 2</title>
    <link rel="stylesheet" href="./src/styles.css" />
    <script type="importmap">
      {
        "imports": {
          "three": "./vendor/three/build/three.module.js",
          "three/addons/": "./vendor/three/examples/jsm/"
        }
      }
    </script>
  </head>
  <body>
    <div id="app">
      <header class="toolbar">
        <h1>NS-3 UB Topology Viewer (Stage 3)</h1>
        <div class="hint">拖动: 左键旋转 | 右键平移 | 滚轮缩放</div>
      </header>

      <main class="canvas-wrap">
        <canvas id="topology-canvas"></canvas>

        <aside class="node-port-panel" id="node-port-panel">
          <div class="npp-title">节点端口排序</div>
          <div class="npp-sub" id="npp-sub">点击节点后显示端口分组</div>
          <div class="npp-grid">
            <div class="npp-col" id="npp-col-up">
              <div class="npp-head">上行端口</div>
              <div class="npp-list" id="npp-up">-</div>
            </div>
            <div class="npp-col" id="npp-col-down">
              <div class="npp-head">下行端口</div>
              <div class="npp-list" id="npp-down">-</div>
            </div>
            <div class="npp-col" id="npp-col-same">
              <div class="npp-head">同层端口</div>
              <div class="npp-list" id="npp-same">-</div>
            </div>
          </div>
          <div class="npp-search">
            <div class="npp-head">查询节点</div>
            <div class="npp-search-row">
              <input id="node-query-input" type="number" min="0" placeholder="输入节点ID，例如 832" />
              <button id="node-query-btn" type="button">查询并定位</button>
            </div>
            <div class="npp-search-tip" id="npp-search-tip">可直接输入节点ID定位并显示该节点端口情况</div>
          </div>
        </aside>

        <aside class="path-panel" id="path-panel">
          <div class="npp-head">路径查找（源/目的 Host）</div>
          <div class="npp-search-row">
            <input id="path-src-input" type="number" min="0" placeholder="源Host ID" />
            <input id="path-dst-input" type="number" min="0" placeholder="目的Host ID" />
          </div>
          <div class="npp-search-row">
            <button id="path-find-btn" type="button">查找路径</button>
            <button id="path-reset-btn" type="button">结束透明状态</button>
          </div>
          <div class="npp-search-tip" id="path-status">输入源和目的Host后点击查找路径</div>
        </aside>

        <aside class="panel" id="side-panel">
          <div class="panel-topbar">
            <strong>控制面板</strong>
            <button id="panel-toggle" type="button" aria-expanded="true">收起</button>
          </div>

          <div class="panel-body" id="panel-body">
          <h2>回放控制</h2>
          <div class="controls">
            <label class="field">
              指标
              <select id="metric-select">
                <option value="queue">队列长度（越高越红）</option>
                <option value="utilization">带宽利用率（越高越绿）</option>
              </select>
            </label>

            <div class="row">
              <button id="play-btn" type="button">播放</button>
              <button id="pause-btn" type="button">暂停</button>
            </div>

            <label class="field">
              时间轴
              <input id="time-slider" type="range" min="0" max="0" value="0" step="1" />
            </label>
            <div class="time-label" id="time-label">t = 0 us</div>
            <div class="time-label" id="playback-status">status: init</div>

            <details class="debug-box" open>
              <summary>调试信息</summary>
              <pre id="debug-log">debug: waiting...</pre>
            </details>
          </div>

          <h2>图层说明</h2>
          <ul>
            <li><span class="dot host"></span>Host</li>
            <li><span class="dot tor"></span>ToR</li>
            <li><span class="dot du"></span>DU</li>
            <li><span class="dot l1"></span>L1</li>
            <li><span class="dot hrs"></span>HRS</li>
          </ul>

          <h2>节点交互（预留）</h2>
          <div class="node-info" id="node-info">点击节点后在这里显示详情</div>

          <div class="stats" id="stats">加载中...</div>
          </div>
        </aside>
      </main>
    </div>

    <script type="module" src="./src/main.js?v=20260411-debug9"></script>
  </body>
</html>
